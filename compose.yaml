services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      MONGO_URI: mongodb://mongo:27017/authentication-system
      NODE_ENV: production
      PORT: 3000
    depends_on:
      - mongo

  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: test
    env_file:
      - .env
    environment:
      MONGO_URI: mongodb://mongo:27017/authentication-system-test
      NODE_ENV: test
      PORT: 3000
      COOKIE_SECURE: "false"
      TEST_USE_EXTERNAL_MONGO: "true"
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
